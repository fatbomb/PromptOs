<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PromptOS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f17;
      color: #e2e8f0;
    }

    .logo {
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(90deg, #7C3AED, #06B6D4, #10B981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2px;
    }

    .tagline {
      font-size: 11px;
      color: #6B7280;
      margin-bottom: 14px;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, #7C3AED44, #06B6D444, transparent);
      margin-bottom: 14px;
    }

    .instruction {
      font-size: 12px;
      color: #9CA3AF;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .instruction strong { color: #e2e8f0; }

    .sites {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    .site-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0d0d14;
      border: 1px solid #1e1b2e;
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 12px;
      color: #9CA3AF;
    }

    .site-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #10B981;
      flex-shrink: 0;
    }

    .status {
      font-size: 10px;
      color: #374151;
      text-align: center;
      padding-top: 10px;
      border-top: 1px solid #1e1b2e;
    }

    .status span { color: #7C3AED; }
  </style>
</head>
<body>
  <div class="logo">⚡ PromptOS</div>
  <div class="tagline">prompt refinement layer</div>
  <div class="divider"></div>

  <p class="instruction">
    Navigate to a supported site — the
    <strong>"Enhance with PromptOS"</strong> button will appear automatically below the chat input.
  </p>

  <div class="sites">
    <div class="site-chip"><span class="site-dot"></span>claude.ai</div>
    <div class="site-chip"><span class="site-dot"></span>chat.openai.com</div>
  </div>

  <div class="status">Backend: <span>localhost:8000</span></div>
</body>
</html>
