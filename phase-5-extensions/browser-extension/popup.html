<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PromptOS</title>
  <style>
    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      margin: 0;
    }
    h2 { font-size: 15px; margin: 0 0 8px; }
    p  { font-size: 13px; color: #6c7086; margin: 0 0 12px; line-height: 1.5; }
    a  {
      display: block;
      text-align: center;
      padding: 8px;
      background: #2563eb;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }
    a:hover { background: #1d4ed8; }
    .status {
      margin-top: 12px;
      font-size: 11px;
      color: #45475a;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>⚡ PromptOS</h2>
  <p>Navigate to <strong>claude.ai</strong> or <strong>chat.openai.com</strong> — the "Enhance with PromptOS" button will appear automatically.</p>
  <a href="http://localhost:3000/auth/login" target="_blank">Log in / Dashboard →</a>
  <p class="status">Backend: localhost:8000</p>
</body>
</html>
